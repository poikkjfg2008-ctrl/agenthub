<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSDK Host</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        #websdk-container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 16px;
            color: #666;
        }

        .error {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            flex-direction: column;
            padding: 20px;
            text-align: center;
        }

        .error h2 {
            color: #e53e3e;
            margin-bottom: 10px;
        }

        .error p {
            color: #666;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <div id="websdk-container">
        <div class="loading">加载中...</div>
    </div>

    <script>
        let sdkScript = null;
        let sdkInstance = null;

        const DEFAULT_ALLOWED_MESSAGE_ORIGINS = [
            window.location.origin,
            'http://localhost:5173',
            'http://127.0.0.1:5173'
        ];
        const DEFAULT_ALLOWED_SCRIPT_HOSTS = [
            window.location.hostname,
            'localhost',
            '127.0.0.1'
        ];
        const LOCAL_DEV_SCRIPT_ORIGINS = new Set([
            'http://localhost',
            'http://127.0.0.1'
        ]);

        const hostSecurityConfig = window.SDK_HOST_SECURITY || {};
        const allowedMessageOrigins = new Set(
            hostSecurityConfig.allowedMessageOrigins || DEFAULT_ALLOWED_MESSAGE_ORIGINS
        );
        const allowedScriptHosts = new Set(
            hostSecurityConfig.allowedScriptHosts || DEFAULT_ALLOWED_SCRIPT_HOSTS
        );

        function isAllowedMessageOrigin(origin) {
            return allowedMessageOrigins.has(origin);
        }

        function validateScriptUrl(scriptUrl) {
            let parsed;

            try {
                parsed = new URL(scriptUrl);
            } catch (_error) {
                return { valid: false, reason: 'scriptUrl 不是合法 URL' };
            }

            const isHttps = parsed.protocol === 'https:';
            const isLocalDevHttp = parsed.protocol === 'http:'
                && LOCAL_DEV_SCRIPT_ORIGINS.has(parsed.origin);

            if (!isHttps && !isLocalDevHttp) {
                return {
                    valid: false,
                    reason: 'scriptUrl 必须使用 https，开发环境仅允许 http://localhost 或 http://127.0.0.1'
                };
            }

            if (!allowedScriptHosts.has(parsed.hostname)) {
                return {
                    valid: false,
                    reason: `scriptUrl 主机 ${parsed.hostname} 不在允许名单中`
                };
            }

            return { valid: true, normalizedUrl: parsed.toString() };
        }

        function getParentOrigin() {
            if (!document.referrer) {
                return window.location.origin;
            }

            try {
                return new URL(document.referrer).origin;
            } catch (_error) {
                return window.location.origin;
            }
        }

        window.addEventListener('message', async (event) => {
            if (!event.data || event.data.type !== 'init' || !event.data.config) {
                return;
            }

            if (!isAllowedMessageOrigin(event.origin)) {
                console.warn('[sdk-host] blocked init message from origin:', event.origin);
                return;
            }

            const { config } = event.data;
            const validation = validateScriptUrl(config.scriptUrl);
            if (!validation.valid) {
                showError(validation.reason);
                return;
            }

            config.scriptUrl = validation.normalizedUrl;
            await initWebSDK(config);
        });

        async function initWebSDK(config) {
            try {
                if (!config.scriptUrl) {
                    showError('缺少 scriptUrl 配置');
                    return;
                }

                if (!sdkScript || sdkScript.src !== config.scriptUrl) {
                    sdkScript = document.createElement('script');
                    sdkScript.src = config.scriptUrl;
                    sdkScript.onload = () => initializeSDK(config);
                    sdkScript.onerror = () => showError('WebSDK 脚本加载失败');
                    document.head.appendChild(sdkScript);
                } else {
                    initializeSDK(config);
                }
            } catch (error) {
                showError('初始化失败: ' + error.message);
            }
        }

        function initializeSDK(config) {
            const container = document.getElementById('websdk-container');

            container.innerHTML = '';

            const sdkContainer = document.createElement('div');
            sdkContainer.id = 'websdk-embed';
            sdkContainer.style.width = '100%';
            sdkContainer.style.height = '100%';
            container.appendChild(sdkContainer);

            if (window.HiagentWebSDK && window.HiagentWebSDK.WebLiteClient) {
                sdkInstance = new window.HiagentWebSDK.WebLiteClient({
                    appKey: config.appKey,
                    baseUrl: config.baseUrl,
                    token: config.launchToken,
                    user: config.userContext,
                    container: '#websdk-embed'
                });
            } else {
                showError('HiagentWebSDK.WebLiteClient 未找到');
            }
        }

        function showError(message) {
            const container = document.getElementById('websdk-container');
            container.innerHTML = `
                <div class="error">
                    <h2>加载失败</h2>
                    <p>${message}</p>
                </div>
            `;
        }

        const parentOrigin = getParentOrigin();
        if (isAllowedMessageOrigin(parentOrigin)) {
            window.parent.postMessage({ type: 'ready' }, parentOrigin);
        }
    </script>
</body>
</html>
